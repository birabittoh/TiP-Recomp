name: Build

on:
  push:
    branches: ["**"]
    tags:
      - "[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            runner: windows-latest
            preset: win-amd64-relwithdebinfo
            binary: out\build\win-amd64-relwithdebinfo\retip.exe
            artifact: retip-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Windows x64 ────────────────────────────────────────────────────────
      - name: Install Ninja (Windows)
        if: matrix.platform == 'windows'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Download rexglue SDK (Windows x64)
        if: matrix.platform == 'windows' && matrix.arch == 'x64'
        run: |
          Invoke-WebRequest -Uri "https://github.com/rexglue/rexglue-sdk/releases/download/v0.7.2/rexglue-sdk-win-amd64.zip" -OutFile rexglue-sdk.zip
          Expand-Archive rexglue-sdk.zip -DestinationPath rexglue-install
        shell: pwsh

      - name: Configure CMake (Windows)
        if: matrix.platform == 'windows'
        run: cmake --preset ${{ matrix.preset }} -DCMAKE_PREFIX_PATH="${{ github.workspace }}\rexglue-install\win-amd64"

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s globstar
          gh release create "${{ github.ref_name }}" \
            --title "ReTiP Launcher ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/**/*
